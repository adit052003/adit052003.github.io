<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Exercise 05-01 - Box Events</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script>
      AFRAME.registerComponent('my-color-toggle', {
        schema: {
          color1: {type: 'color', default: 'orange'},
          color2: {type: 'color', default: 'purple'}
        },

        init: function () {
          const el = this.el;
          const data = this.data;
          let toggled = false;

          this.toggleColor = function () {
            toggled = !toggled;
            el.setAttribute('color', toggled ? data.color1 : data.color2);
          };

          el.addEventListener('click', this.toggleColor);
        },

        remove: function () {
          this.el.removeEventListener('click', this.toggleColor);
        }
      });
    </script>
  </head>
  <body>
    <a-scene cursor="rayOrigin: mouse;" raycaster="objects: .rayclick;">
      <a-box id="one" position="-2 0 -7" color="red"></a-box>
      <a-box
        id="two"
        position="0 0 -7"
        color="blue"
        class="rayclick"
        my-color-toggle="color1: orange; color2: gold"
      ></a-box>
      <a-box
        id="three"
        position="2 0 -7"
        color="green"
        class="rayclick"
        my-color-toggle="color1: hotpink; color2: cyan"
      ></a-box>
    </a-scene>
  </body>
</html>
