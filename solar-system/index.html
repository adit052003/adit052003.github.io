<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Solar System - CMPT461 VR</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #info-panel {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 12px 24px;
      border-radius: 12px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 14px;
      z-index: 999;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
    }

    #info-panel kbd {
      background: rgba(255, 255, 255, 0.15);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div id="info-panel">
    🌌 Solar System &mdash; Use <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> to move &bull; Click &amp; drag to
    look around
  </div>

  <script>
    /* ──────────────── Custom orbit component ──────────────── */
    AFRAME.registerComponent('orbit', {
      schema: {
        radius: { type: 'number', default: 5 },
        speed: { type: 'number', default: 1 },
        tilt: { type: 'number', default: 0 }
      },
      init: function () {
        this.angle = Math.random() * Math.PI * 2; // random start position
      },
      tick: function (time, timeDelta) {
        this.angle += this.data.speed * (timeDelta / 1000);
        var r = this.data.radius;
        var tiltRad = this.data.tilt * Math.PI / 180;
        this.el.object3D.position.x = r * Math.cos(this.angle);
        this.el.object3D.position.z = r * Math.sin(this.angle);
        this.el.object3D.position.y = r * Math.sin(this.angle) * Math.sin(tiltRad);
      }
    });

    /* ──────────────── Sun color cycling component ──────────────── */
    AFRAME.registerComponent('sun-color-cycle', {
      schema: {
        dur: { type: 'number', default: 6000 }
      },
      init: function () {
        this.colors = [
          { r: 1.0, g: 0.85, b: 0.0 },   // golden yellow
          { r: 1.0, g: 0.55, b: 0.0 },   // orange
          { r: 1.0, g: 0.27, b: 0.0 },   // red-orange
          { r: 1.0, g: 0.1, b: 0.1 },   // red
          { r: 1.0, g: 0.55, b: 0.0 },   // orange
          { r: 1.0, g: 0.85, b: 0.0 }    // back to yellow
        ];
        this.elapsed = 0;
        this.sunLight = document.querySelector('#sunLight');
        this.glowSphere = document.querySelector('#sunGlow');
      },
      tick: function (time, timeDelta) {
        this.elapsed += timeDelta;
        var total = this.data.dur;
        var t = (this.elapsed % total) / total;
        var segments = this.colors.length - 1;
        var seg = Math.floor(t * segments);
        var local = (t * segments) - seg;
        if (seg >= segments) { seg = segments - 1; local = 1; }
        var c1 = this.colors[seg];
        var c2 = this.colors[seg + 1];
        var r = c1.r + (c2.r - c1.r) * local;
        var g = c1.g + (c2.g - c1.g) * local;
        var b = c1.b + (c2.b - c1.b) * local;
        var mesh = this.el.getObject3D('mesh');
        if (mesh && mesh.material) {
          mesh.material.color.setRGB(r, g, b);
          if (mesh.material.emissive) {
            mesh.material.emissive.setRGB(r * 0.8, g * 0.6, b * 0.2);
          }
        }
        var colorString = `rgb(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)})`;
        if (this.sunLight) {
          this.sunLight.setAttribute('light', 'color', colorString);
        }
        if (this.glowSphere) {
          this.glowSphere.setAttribute('material', 'color', colorString);
        }
      }
    });

    /* ──────────────── Self-rotation component ──────────────── */
    AFRAME.registerComponent('self-rotate', {
      schema: {
        speed: { type: 'number', default: 0.5 }
      },
      tick: function (time, timeDelta) {
        this.el.object3D.rotation.y += this.data.speed * (timeDelta / 1000);
      }
    });

    /* ──────────────── Orbit ring (visual path) ──────────────── */
    AFRAME.registerComponent('orbit-ring', {
      schema: {
        radius: { type: 'number', default: 5 }
      },
      init: function () {
        var r = this.data.radius;
        var geometry = new THREE.RingGeometry(r - 0.02, r + 0.02, 128);
        var material = new THREE.MeshBasicMaterial({
          color: 0x444466, side: THREE.DoubleSide, transparent: true, opacity: 0.3
        });
        var mesh = new THREE.Mesh(geometry, material);
        mesh.rotation.x = -Math.PI / 2;
        this.el.object3D.add(mesh);
      }
    });
  </script>

  <a-scene vr-mode-ui="enabled: true">
    <!-- ═══════════ Asset textures ═══════════ -->
    <a-assets>
      <img id="tex-sun"
        src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/lensflare/lensflare0.png"
        crossorigin="anonymous">
      <img id="tex-mercury"
        src="https://raw.githubusercontent.com/jeromeetienne/threex.planets/master/images/mercurymap.jpg"
        crossorigin="anonymous">
      <img id="tex-venus"
        src="https://raw.githubusercontent.com/jeromeetienne/threex.planets/master/images/venusmap.jpg"
        crossorigin="anonymous">
      <img id="tex-earth"
        src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/earth_atmos_2048.jpg"
        crossorigin="anonymous">
      <img id="tex-mars"
        src="https://raw.githubusercontent.com/jeromeetienne/threex.planets/master/images/marsmap1k.jpg"
        crossorigin="anonymous">
      <img id="tex-jupiter"
        src="https://raw.githubusercontent.com/jeromeetienne/threex.planets/master/images/jupitermap.jpg"
        crossorigin="anonymous">
      <img id="stars-bg"
        src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/starmap_2020_4k_print.jpg"
        crossorigin="anonymous">
    </a-assets>

    <!-- ═══════════ Starfield Sky ═══════════ -->
    <a-sky src="#stars-bg" rotation="0 0 0"></a-sky>

    <!-- ═══════════ Orbit path rings (visual guides) ═══════════ -->
    <a-entity position="0 0 0" orbit-ring="radius: 6"></a-entity>
    <a-entity position="0 0 0" orbit-ring="radius: 9"></a-entity>
    <a-entity position="0 0 0" orbit-ring="radius: 13"></a-entity>
    <a-entity position="0 0 0" orbit-ring="radius: 18"></a-entity>
    <a-entity position="0 0 0" orbit-ring="radius: 24"></a-entity>

    <!-- ═══════════ SUN ═══════════ -->
    <a-sphere id="sun" position="0 0 0" radius="3" material="shader: flat; color: #FFF; src: #tex-sun"
      sun-color-cycle="dur: 4000" self-rotate="speed: 0.2"></a-sphere>

    <!-- Sun glow effect (larger transparent sphere) -->
    <a-sphere id="sunGlow" position="0 0 0" radius="3.8"
      material="shader: flat; color: #FF8C00; transparent: true; opacity: 0.35; blending: additive"></a-sphere>

    <!-- ═══════════ MERCURY ═══════════ -->
    <a-entity id="mercury-orbit" orbit="radius: 6; speed: 1.6; tilt: 2">
      <a-sphere radius="0.4" src="#tex-mercury" material="roughness: 0.9; metalness: 0.1"
        self-rotate="speed: 0.3"></a-sphere>
      <a-text value="Mercury" position="0 0.7 0" align="center" color="#ccc" width="3" look-at="[camera]"></a-text>
    </a-entity>

    <!-- ═══════════ VENUS ═══════════ -->
    <a-entity id="venus-orbit" orbit="radius: 9; speed: 1.1; tilt: 1">
      <a-sphere radius="0.7" src="#tex-venus" material="roughness: 0.5; metalness: 0.2"
        self-rotate="speed: -0.15"></a-sphere>
      <a-text value="Venus" position="0 1 0" align="center" color="#ccc" width="3" look-at="[camera]"></a-text>
    </a-entity>

    <!-- ═══════════ EARTH ═══════════ -->
    <a-entity id="earth-orbit" orbit="radius: 13; speed: 0.8; tilt: 0">
      <a-sphere radius="0.8" src="#tex-earth" material="roughness: 0.6; metalness: 0.1"
        self-rotate="speed: 1.0"></a-sphere>
      <a-text value="Earth" position="0 1.1 0" align="center" color="#88ccff" width="3" look-at="[camera]"></a-text>
      <!-- Moon orbiting Earth -->
      <a-entity orbit="radius: 1.5; speed: 3">
        <a-sphere radius="0.2" color="#ccc" material="roughness: 0.9; metalness: 0.1"
          self-rotate="speed: 0.5"></a-sphere>
      </a-entity>
    </a-entity>

    <!-- ═══════════ MARS ═══════════ -->
    <a-entity id="mars-orbit" orbit="radius: 18; speed: 0.55; tilt: 1.5">
      <a-sphere radius="0.55" src="#tex-mars" material="roughness: 0.8; metalness: 0.1"
        self-rotate="speed: 0.9"></a-sphere>
      <a-text value="Mars" position="0 0.8 0" align="center" color="#ff8866" width="3" look-at="[camera]"></a-text>
    </a-entity>

    <!-- ═══════════ JUPITER ═══════════ -->
    <a-entity id="jupiter-orbit" orbit="radius: 24; speed: 0.35; tilt: 0.5">
      <a-sphere radius="1.2" src="#tex-jupiter" material="roughness: 0.7; metalness: 0.0"
        self-rotate="speed: 1.5"></a-sphere>
      <a-text value="Jupiter" position="0 1.5 0" align="center" color="#ffcc88" width="3" look-at="[camera]"></a-text>
    </a-entity>

    <!-- ═══════════ LIGHTS ═══════════ -->
    <!-- Brighter ambient light so nothing is unseeable -->
    <a-light type="ambient" color="#444455" intensity="35"></a-light>
    <!-- Strong continuous point light from the Sun without decay -->
    <a-light id="sunLight" type="point" color="#FFFFFF" intensity="4" distance="200" decay="0"
      position="0 0 0"></a-light>
    <!-- Directional fill light -->
    <a-light type="directional" color="#EEDDFF" intensity="0.8" position="1 2 1"></a-light>

    <!-- ═══════════ CAMERA with WASD ═══════════ -->
    <a-entity id="camera-rig" position="0 12 30">
      <a-entity camera look-controls wasd-controls="acceleration: 40" position="0 0 0">
        <a-cursor color="#FFD700" fuse="false" raycaster="far: 100"></a-cursor>
      </a-entity>
    </a-entity>

  </a-scene>
</body>

</html>
