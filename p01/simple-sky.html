
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <!-- <script src="../js/aframe.min.js"></script> -->
  </head>
  <body>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
          const isLocal = true;
          const src = isLocal
            ? './IMAGES/heic2007a.jpg'
            : './IMAGES/heic2007a.jpg';

          const img = document.getElementById('nebula');
          img.setAttribute('src', src);        // set it

          // once assets are ready, use it
          document.querySelector('a-assets').addEventListener('loaded', () => {
            document.getElementById('mySky')
              .setAttribute('material', 'src: #nebula');
          });
        });
      </script>
     <a-scene> 
      <a-assets>
          <img id="nebula" crossorigin="anonymous">
      </a-assets>
        
          <a-sky id="mySky"
            src="#nebula"	position="-2.5  0 -1.5"
          ></a-sky>	  
          <a-text
            font="kelsonsans"
            color = "#FFFFFF"
            value="Welcome to the Nebula!"
            width="6"
        position="2 -2 -10"
          ></a-text>
    </a-scene>
  </body>
</html>
